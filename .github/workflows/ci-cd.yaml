name: Node.js Docker CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    steps:
      # Checkout code
      - name: Checkout code
        uses: actions/checkout@v3

      # Set up Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      # Log in to Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Compute short SHA for tagging
      - name: Set IMAGE_TAG
        run: echo "IMAGE_TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV

      #  Build Docker image
      - name: Build Docker image
        run: docker build -t 3lack3ox/my-node-app:$IMAGE_TAG .

      # Run tests inside Docker
      - name: Run tests
        run: docker run --rm 3lack3ox/my-node-app:$IMAGE_TAG npm test

      # Push Docker image to Docker Hub
      - name: Push Docker image
        run: docker push 3lack3ox/my-node-app:$IMAGE_TAG

      # Deploy to EC2
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: IMAGE_TAG
          script: |
            echo "Deploying Docker image $IMAGE_TAG on EC2..."
            docker pull 3lack3ox/my-node-app:$IMAGE_TAG
            docker stop my-node-app || true
            docker rm my-node-app || true
            docker run -d --name my-node-app -p 3000:3000 3lack3ox/my-node-app:$IMAGE_TAG

      # Post-deploy health check
      - name: Post-deploy health check
        run: |
          echo "Waiting for service to start..."
          sleep 10
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 http://${{ secrets.EC2_HOST }}:3000)
          if [ "$STATUS" != "200" ]; then
            echo "Deployment failed with status $STATUS"
            exit 1
          else
            echo "Deployment successful! Service is healthy."
          fi
name: Node.js Docker CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        run: |
          IMAGE_TAG=${GITHUB_SHA::7}
          docker build -t 3lack3ox/my-node-app:$IMAGE_TAG .
          docker tag 3lack3ox/my-node-app:$IMAGE_TAG 3lack3ox/my-node-app:latest

      - name: Run tests
        run: |
          IMAGE_TAG=${GITHUB_SHA::7}
          docker run --rm 3lack3ox/my-node-app:$IMAGE_TAG npm test

      - name: Push Docker images
        run: |
          IMAGE_TAG=${GITHUB_SHA::7}
          docker push 3lack3ox/my-node-app:$IMAGE_TAG
          docker push 3lack3ox/my-node-app:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            IMAGE_TAG=${GITHUB_SHA::7}
            docker pull 3lack3ox/my-node-app:$IMAGE_TAG
            docker stop my-node-app || true
            docker rm my-node-app || true
            docker run -d --name my-node-app -p 3000:3000 3lack3ox/my-node-app:$IMAGE_TAG

      - name: Post-deploy health check
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://${{ secrets.EC2_HOST }}:3000)
          if [ "$STATUS" != "200" ]; then
            echo "Deployment failed with status $STATUS"
            exit 1
          else
            echo "Deployment successful! Service is healthy."
          fi